name: Supabase Keep Alive

on:
  schedule:
    # 每 6 小时运行一次，避开整点以减少 GitHub 调度延迟的影响
    - cron: '17 */6 * * *'
  workflow_dispatch: # 支持手动触发测试

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Insert heartbeat row
        run: |
          curl --fail --show-error --silent \
          -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/test" \
          -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Content-Type: application/json" \
          -H "Prefer: return=representation" \
          -d '{}'

      - name: Delete rows older than 7 days
        run: |
          cutoff="$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)"
          curl --fail --show-error --silent \
          -X DELETE "${{ secrets.SUPABASE_URL }}/rest/v1/test?created_at=lt.${cutoff}" \
          -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

      - name: Show recent heartbeat rows
        run: |
          curl --fail --show-error --silent \
          -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/test?select=id,created_at&order=created_at.desc&limit=5" \
          -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
